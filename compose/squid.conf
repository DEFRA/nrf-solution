################################################################################
# squid.conf — simulates CDP outbound proxy ACL for local development
#
# In DEFRA CDP, every service's outbound internet traffic goes through a
# Squid proxy. Only domains listed in the service's ACL (cdp-tenant-config)
# are allowed. Everything else is blocked.
#
# This config mirrors that setup so proxy misconfigurations are caught before
# deployment rather than after.
################################################################################

http_port 3128

pid_filename /tmp/squid.pid

# No caching — this is a forward proxy, not a cache
cache deny all

# ---------------------------------------------------------------------------
# Docker internal network ranges
# undici's ProxyAgent routes ALL fetch() calls through the proxy — it does not
# read NO_PROXY automatically. Internal service-to-service calls (e.g. to
# localstack:4566, impact-assessor:8085) are allowed here and bypass the safe
# port restrictions that apply to external traffic.
# ---------------------------------------------------------------------------

acl docker_internal dst 10.0.0.0/8
acl docker_internal dst 172.16.0.0/12
acl docker_internal dst 192.168.0.0/16

http_access allow docker_internal

# ---------------------------------------------------------------------------
# Safe port and CONNECT guards for external traffic only
# ---------------------------------------------------------------------------

acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
acl SSL_ports port 443

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ---------------------------------------------------------------------------
# CDP platform default domains
# All CDP services get access to these automatically without any ACL config.
# See: CDP proxy documentation — "Default Domains Access Control List"
# ---------------------------------------------------------------------------

acl cdp_defaults dstdomain www.gov.uk
acl cdp_defaults dstdomain login.microsoftonline.com
acl cdp_defaults dstdomain api.notifications.service.gov.uk
acl cdp_defaults dstdomain .amazonaws.com
acl cdp_defaults dstdomain .auth.eu-west-2.amazoncognito.com
acl cdp_defaults dstdomain .browserstack.com

# ---------------------------------------------------------------------------
# NRF service-specific allowed domains
# These mirror what is configured in cdp-tenant-config for nrf services.
# To add a new domain: add it here AND raise a PR in cdp-tenant-config.
# ---------------------------------------------------------------------------

acl nrf_allowed dstdomain api.os.uk        # Ordnance Survey vector tile API (frontend)

# ---------------------------------------------------------------------------
# Access rules for external traffic — order matters (first match wins)
# ---------------------------------------------------------------------------

http_access allow cdp_defaults
http_access allow nrf_allowed
http_access deny all
